<!DOCTYPE html>
<html lang="tr">
<head>

<title>ROSTER PUBG Başvuru</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Orbitron',sans-serif;background:linear-gradient(180deg,#0a0a0a,#151515);color:white;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}

button{width:100%;padding:14px;border:none;border-radius:10px;background:white;color:black;font-weight:600;font-size:14px;cursor:pointer;transition:0.2s}

</head>

</select>

</select>
<label>Günde Kaç Saat Oynuyorsun</label><input type="text" name="saat">
<label>Instagram</label><input type="text" name="instagram">
<button type="submit">BAŞVURUYU GÖNDER</button>
</form>
<div class="footer">ROSTER ESPORT ©</div>
</div>
</body>
</html>
