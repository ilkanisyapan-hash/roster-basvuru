<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROSTER PUBG Başvuru</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            background-image: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.95)), url('https://i.imgur.com/8N4R4vM.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 480px;
            max-width: 100%;
            background: rgba(17, 17, 17, 0.9);
            border: 1px solid #333;
            border-radius: 16px;
            padding: 35px;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            backdrop-filter: blur(5px);
        }
        .logo { text-align: center; font-size: 45px; margin-bottom: 10px; }
        .title { text-align: center; font-size: 28px; margin-bottom: 5px; letter-spacing: 3px; font-weight: 700; }
        .register-call { text-align: center; font-size: 18px; color: #fff; margin-bottom: 25px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; border-top: 1px solid #444; border-bottom: 1px solid #444; padding: 10px 0; }
        label { font-size: 11px; color: #ccc; display: block; margin-bottom: 7px; }
        input, select { width: 100%; padding: 13px; margin-bottom: 18px; background: rgba(26, 26, 26, 0.8); border: 1px solid #444; border-radius: 8px; color: white; font-family: inherit; }
        .submit-btn { width: 100%; padding: 16px; border: none; border-radius: 12px; background: #ffffff; color: #000; font-weight: 700; font-size: 15px; text-transform: uppercase; cursor: pointer; transition: 0.3s; margin-top: 15px; }
        .submit-btn:hover { background: #dddddd; transform: translateY(-3px); }
        .footer { text-align: center; font-size: 10px; color: #666; margin-top: 30px; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">🦉</div>
    <div class="title">ROSTER</div>
    <div class="register-call">SEN DE KAYIT OL</div>

    <form action="https://formspree.io/f/xreylzzb" method="POST" enctype="multipart/form-data">
        
        <label>İsim / Oyun Nicki</label>
        <input type="text" name="nickname" required>

        <label>E-posta Adresiniz (Doğrulama için gereklidir)</label>
        <input type="email" name="email" required placeholder="ornek@gmail.com">

        <label>Yaş</label>
        <input type="number" name="yas" required>

        <label>PUBG ID</label>
        <input type="text" name="pubg_id" required>

        <label>Mevcut Rank</label>
        <select name="rank" required>
            <option value="">Seçiniz...</option>
            <option>Bronz - Platin</option>
            <option>Elmas - Taç</option>
            <option>As / As Ustası</option>
            <option>As Otoritesi</option>
            <option>Fatih</option>
        </select>

        <button type="submit" class="submit-btn">BAŞVURUYU TAMAMLA</button>

    </form>
    <div class="footer">ROSTER ESPORTS © 2026</div>
</div>

</body>
</html>
